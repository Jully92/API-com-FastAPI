name: Continuous Integration #nome do workflow
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build: #nome do job
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code #Check Out do nosso repositorio
        uses: actions/checkout@v5
      - name: Python Lint Code Scanning Action #Roda o linter
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: user/app:latest

  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run:
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test with pytest
        run:
          pip install pytest pytest-cov pytest-asyncio
          pytest test/test.py --doctest-modules --junitxml=junit/test-results.xml --cov=com cov-report=xml --cov-report=html