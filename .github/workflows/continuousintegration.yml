name: Continuous Integration #nome do workflow
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build: #nome do job
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code #Check Out do nosso repositorio
        uses: actions/checkout@v5

      - name: Python Lint Code Scanning Action #Roda o linter
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint
  docker:
    runs-on: ubuntu-latest
    steps:
      - # Add support for more platforms with QEMU (optional)
        # https://github.com/docker/setup-qemu-action
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: user/app:latest
